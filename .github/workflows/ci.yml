name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:compiled

      - name: Examples
        run: npm run examples:compiled

      - name: Browser build
        run: npm run build:browser

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Package smoke test
        run: |
          npm run package:check
          node -e "import('./dist/index.js').then(m => { if (typeof m.encodeTONL !== 'function' || typeof m.decodeTONL !== 'function') process.exit(1) })"
          node -e "import('./dist/query/index.js').then(m => { if (!m.QueryEvaluator) process.exit(1) })"
          node -e "import('./dist/browser/tonl.esm.js').then(m => { if (typeof m.encodeTONL !== 'function') process.exit(1) })"
